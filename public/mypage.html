<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mollip - 마이페이지</title>

    <link rel="stylesheet" href="./css/common.css">
    <link rel="stylesheet" href="./css/mypage.css">

    <link href="https://cdn.jsdelivr.net/npm/remixicon@4.7.0/fonts/remixicon.css" rel="stylesheet" />
</head>
<body>
    
    <header>
        <div class="w1720 mainHeader">
            <a href="/index.html" class="headerLogo">
                <img src="./images/LOGO.png" alt="Mollip">
            </a>

            <nav class="headerNav">
                <a href="/index.html">홈</a>
                <button type="button" id="logoutBtn">로그아웃</button>
            </nav>
        </div>
    </header>

    <main class="mypage">
        <div class="w1720">
            <section class="infoT">
                <div>
                    <span>MY PAGE</span>
                    <h1>마이페이지</h1>
                    <p>회원정보와 Mollip 이용 설정을 관리할 수 있습니다.</p>
                </div>
            </section>

            <div class="leftBar">
                <!-- 좌측 사이드 바 -->
                <aside class="mypageMenu">
                    <button type="button" class="menuItem active">회원정보</button>
                    <button type="button" class="menuItem">과목설정</button>
                    <button type="button" class="menuItem">스터디그룹 설정</button>
                </aside>

                <!-- 우측 영역 -->
                <div class="rightCont">

                    <!-- 회원정보 -->
                    <section id="profileSection" class="mySec">
                        <div class="myProfile">
                            <div class="PImgSec">
                                <button type="button" id="profileEditBtn"><i class="ri-pencil-line"></i></button>
                                <input type="file" id="profileImageInput" accept="image/*" hidden>
                                <div class="imgBox">
                                    <img src="./images/noprofile.png" alt="기본 프로필 이미지">
                                </div>
                            </div>
                            <div class="PinfoSec">
                                <div class="PId">
                                    <p id="profileUserid"></p>
                                </div>
                                <p class="PData">🔥 Mollip와 함께 <span id="studyDays"></span>일째 공부중</p>
                            <button type="button" id="editBtn">수정</button>
                            </div>
                        </div>

                        <!-- 확인, 수정 폼 -->
                        <form id="profileForm">
                            <div class="formGroup">
                                <label for="nickname">닉네임</label>
                                <input type="text" id="nickname" name="nickname" maxlength="20" disabled>
                            </div>

                            <div class="formGroup">
                                <label for="username">이름</label>
                                <input type="text" id="username" name="username" maxlength="20" disabled>
                            </div>

                            <div class="formGroup">
                                <label for="email">이메일</label>
                                <input type="email" id="email" name="email" maxlength="50" disabled>
                            </div>

                            <!-- 수정클릭 시 나타날 버튼 -->
                            <div id="editAct" class="hidden">
                                <button type="button" id="cancelBtn">취소</button>
                                <button type="submit" id="submitBtn">저장</button>
                            </div>
                        </form>
                    </section>
                </div>
            </div>
        </div>
    </main>

    <script src="/js/mypage.js"></script>
</body>
</html>
